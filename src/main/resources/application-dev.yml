spring:
  datasource:
    url: jdbc:mysql://localhost:3306/workbatch_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

  batch:
    job:
      enabled: true
    jdbc:
      initialize-schema: always
